syntax = "proto3";

package pinocchio.chatapp.v1;

option go_package = "github.com/go-go-golems/pinocchio/pkg/chatapp/pb/proto/pinocchio/chatapp/v1;chatappv1";

message StartInferenceCommand {
  string prompt = 1;
  string idempotency_key = 2;
  string request_id = 3;
}

message StopInferenceCommand {}

message UsageInfo {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 cached_tokens = 3;
  int32 cache_creation_input_tokens = 4;
  int32 cache_read_input_tokens = 5;
}

message CorrelationInfo {
  string session_id = 1;
  string run_id = 2;
  string turn_id = 4;
  string provider_call_id = 5;
  string segment_id = 15;
  string tool_call_id = 19;
}

message ChatRunStarted {
  string message_id = 1;
  string prompt = 2;
  CorrelationInfo correlation = 3;
}

message ChatRunFinished {
  string message_id = 1;
  string status = 2;
  string error = 3;
  optional int64 duration_ms = 4;
  CorrelationInfo correlation = 5;
}

message ChatRunStopped {
  string message_id = 1;
  string status = 2;
  string error = 3;
  CorrelationInfo correlation = 4;
}

message ChatRunFailed {
  string message_id = 1;
  string status = 2;
  string error = 3;
  CorrelationInfo correlation = 4;
}

message ChatProviderCallStarted {
  CorrelationInfo correlation = 1;
}

message ChatProviderCallMetadataUpdated {
  string stop_reason = 1;
  UsageInfo usage = 2;
  CorrelationInfo correlation = 3;
}

message ChatProviderCallFinished {
  string stop_reason = 1;
  string finish_class = 2;
  UsageInfo usage = 3;
  optional int64 duration_ms = 4;
  bool has_tool_calls = 5;
  CorrelationInfo correlation = 6;
}

message ChatTextSegmentStarted {
  string message_id = 1;
  string role = 2;
  string prompt = 3;
  string status = 4;
  bool streaming = 5;
  CorrelationInfo correlation = 6;
}

enum ChatStreamPatchMode {
  CHAT_STREAM_PATCH_MODE_UNSPECIFIED = 0;
  CHAT_STREAM_PATCH_MODE_APPEND = 1;
  CHAT_STREAM_PATCH_MODE_SNAPSHOT = 2;
  CHAT_STREAM_PATCH_MODE_REPLACE = 3;
}

message ChatTextPatch {
  string message_id = 1;
  string role = 2;
  string stream_id = 3;
  uint64 sequence = 4;
  uint64 offset = 5;
  string text = 6;
  ChatStreamPatchMode mode = 7;
  string status = 8;
  bool final = 9;
  string finish_reason = 10;
  string prompt = 11;
  CorrelationInfo correlation = 12;
}

message ChatTextSegmentFinished {
  string message_id = 1;
  string role = 2;
  string prompt = 3;
  string text = 4;
  string content = 5;
  string status = 6;
  bool streaming = 7;
  bool final = 8;
  string finish_reason = 9;
  CorrelationInfo correlation = 10;
}

message ChatReasoningSegmentStarted {
  string message_id = 1;
  string parent_message_id = 2;
  string role = 3;
  string status = 4;
  bool streaming = 5;
  string source = 6;
  CorrelationInfo correlation = 7;
}

message ChatReasoningPatch {
  string message_id = 1;
  string parent_message_id = 2;
  string role = 3;
  string stream_id = 4;
  uint64 sequence = 5;
  uint64 offset = 6;
  string text = 7;
  ChatStreamPatchMode mode = 8;
  string status = 9;
  bool final = 10;
  string source = 11;
  string finish_reason = 12;
  CorrelationInfo correlation = 13;
}

message ChatReasoningSegmentFinished {
  string message_id = 1;
  string parent_message_id = 2;
  string role = 3;
  string text = 4;
  string content = 5;
  string status = 6;
  bool streaming = 7;
  string source = 8;
  string finish_reason = 9;
  CorrelationInfo correlation = 10;
}

message ChatToolCallStarted {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string input = 4;
  bool executing = 5;
  string status = 6;
  CorrelationInfo correlation = 7;
}

message ChatToolArgumentsPatch {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string stream_id = 4;
  uint64 sequence = 5;
  uint64 offset = 6;
  string arguments = 7;
  ChatStreamPatchMode mode = 8;
  string status = 9;
  bool final = 10;
  CorrelationInfo correlation = 11;
}

message ChatToolCallRequested {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string input = 4;
  bool executing = 5;
  string status = 6;
  CorrelationInfo correlation = 7;
}

message ChatToolExecutionStarted {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string input = 4;
  bool executing = 5;
  string status = 6;
  CorrelationInfo correlation = 7;
}

message ChatToolResultReady {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string result = 4;
  string status = 5;
  CorrelationInfo correlation = 6;
}

message ChatToolCallFinished {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string status = 4;
  CorrelationInfo correlation = 5;
}

message ChatUserMessageAccepted {
  string message_id = 1;
  string role = 2;
  string prompt = 3;
  string text = 4;
  string content = 5;
  string status = 6;
}

message ChatMessageEntity {
  string message_id = 1;
  string role = 2;
  string prompt = 3;
  string text = 4;
  string content = 5;
  string status = 6;
  bool streaming = 7;
  string error = 8;
  string parent_message_id = 9;
  int32 segment = 10;
  string segment_type = 11;
  bool final = 12;
  CorrelationInfo correlation = 13;
}

message AgentModePreviewUpdate {
  string message_id = 1;
  string candidate_mode = 2;
  string analysis = 3;
  string parse_state = 4;
  bool preview = 5;
}

message AgentModeCommittedUpdate {
  string message_id = 1;
  string title = 2;
  string from = 3;
  string to = 4;
  string analysis = 5;
  bool preview = 6;
}

message AgentModePreviewCleared {
  string message_id = 1;
}

message AgentModeEntity {
  string message_id = 1;
  string title = 2;
  string from = 3;
  string to = 4;
  string analysis = 5;
  bool preview = 6;
}

message ToolCallEntity {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string input = 4;
  bool executing = 5;
  string status = 6;
  CorrelationInfo correlation = 7;
}

message ToolResultEntity {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string result = 4;
  string status = 5;
  CorrelationInfo correlation = 6;
}
