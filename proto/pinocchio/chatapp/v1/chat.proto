syntax = "proto3";

package pinocchio.chatapp.v1;

option go_package = "github.com/go-go-golems/pinocchio/pkg/chatapp/pb/proto/pinocchio/chatapp/v1;chatappv1";

message StartInferenceCommand {
  string prompt = 1;
  string idempotency_key = 2;
  string request_id = 3;
}

message StopInferenceCommand {}

message ChatMessageUpdate {
  string message_id = 1;
  string role = 2;
  string prompt = 3;
  string chunk = 4;
  string text = 5;
  string content = 6;
  string status = 7;
  bool streaming = 8;
  string error = 9;
  string parent_message_id = 10;
  int32 segment = 11;
  string segment_type = 12;
  bool final = 13;
}

message ChatMessageEntity {
  string message_id = 1;
  string role = 2;
  string prompt = 3;
  string text = 4;
  string content = 5;
  string status = 6;
  bool streaming = 7;
  string error = 8;
  string parent_message_id = 9;
  int32 segment = 10;
  string segment_type = 11;
  bool final = 12;
}

message ReasoningUpdate {
  string message_id = 1;
  string parent_message_id = 2;
  int32 segment = 3;
  string role = 4;
  string chunk = 5;
  string text = 6;
  string content = 7;
  string status = 8;
  bool streaming = 9;
  string source = 10;
  string segment_type = 11;
  string provider = 12;
  string response_id = 13;
  string item_id = 14;
  optional int32 output_index = 15;
  optional int32 summary_index = 16;
}

message AgentModePreviewUpdate {
  string message_id = 1;
  string candidate_mode = 2;
  string analysis = 3;
  string parse_state = 4;
  bool preview = 5;
}

message AgentModeCommittedUpdate {
  string message_id = 1;
  string title = 2;
  string from = 3;
  string to = 4;
  string analysis = 5;
  bool preview = 6;
}

message AgentModePreviewCleared {
  string message_id = 1;
}

message AgentModeEntity {
  string message_id = 1;
  string title = 2;
  string from = 3;
  string to = 4;
  string analysis = 5;
  bool preview = 6;
}

message ToolCallUpdate {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string input = 4;
  bool executing = 5;
  string status = 6;
}

message ToolResultUpdate {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string result = 4;
  string status = 5;
}

message ToolCallEntity {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string input = 4;
  bool executing = 5;
  string status = 6;
}

message ToolResultEntity {
  string message_id = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  string result = 4;
  string status = 5;
}
