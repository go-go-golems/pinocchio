version: v1
deps:
  - buf.build/google/protobuf
lint:
  use:
    - STANDARD
  except:
    # We intentionally keep active protos grouped by domain folder and we do not
    # suffix all packages with .v1 yet. Disable the strict directory/package rules.
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_VERSION_SUFFIX
    - DIRECTORY_SAME_PACKAGE
breaking:
  use:
    - FILE
