name: Buf CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - '**.proto'
      - '**/buf.yaml'
      - '**/buf.lock'
      - '**/buf.md'
      - '**/README.md'
      - '**/LICENSE'
      - '.github/workflows/buf-ci.yaml'
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Buf token from Vault
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yolo.scapegoat.dev
          method: jwt
          path: github-actions
          role: bsr-pinocchio-chatapp-publisher
          jwtGithubAudience: https://vault.yolo.scapegoat.dev
          exportToken: false
          secrets: |
            kv/data/ci/buf/pinocchio-chatapp token | BUF_TOKEN

      - uses: bufbuild/buf-action@v1
        with:
          version: '1.55.1'
          token: ${{ env.BUF_TOKEN }}
          breaking_against_registry: true
          lint: true
          format: true
          breaking: true
          push: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
          archive: false
