name: Buf CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - '**.proto'
      - '**/buf.yaml'
      - '**/buf.lock'
      - '**/buf.md'
      - '**/README.md'
      - '**/LICENSE'
      - '.github/workflows/buf-ci.yaml'
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect chatapp proto changes since previous tag
        id: proto_changes
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          previous_tag="$(
            git tag --list 'v*' --sort=-v:refname \
              | grep -v "^${CURRENT_TAG}$" \
              | head -n 1 || true
          )"

          if [ -z "$previous_tag" ]; then
            echo "No previous v* tag found; publishing Buf module."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing chatapp proto files between ${previous_tag} and ${CURRENT_TAG}."
          if git diff --quiet "${previous_tag}..${CURRENT_TAG}" -- 'proto/**/*.proto'; then
            echo "No chatapp proto changes since ${previous_tag}; skipping Buf publish."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Chatapp proto changes detected since ${previous_tag}; publishing Buf module."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read Buf token from Vault
        if: github.event_name == 'push' && github.ref_type == 'tag' && steps.proto_changes.outputs.changed == 'true'
        uses: hashicorp/vault-action@v4
        with:
          url: https://vault.yolo.scapegoat.dev
          method: jwt
          path: github-actions
          role: bsr-pinocchio-chatapp-publisher
          jwtGithubAudience: https://vault.yolo.scapegoat.dev
          exportToken: false
          secrets: |
            kv/data/ci/buf/pinocchio-chatapp token | BUF_TOKEN

      - uses: bufbuild/buf-action@v1
        with:
          version: '1.55.1'
          token: ${{ env.BUF_TOKEN }}
          breaking_against_registry: true
          lint: true
          format: true
          breaking: true
          push: ${{ github.event_name == 'push' && github.ref_type == 'tag' && steps.proto_changes.outputs.changed == 'true' }}
          archive: false
