name: release
on:
  workflow_dispatch:  # Allow manual triggers
  push:
    # run only against tags
    tags:
      - '*'

permissions:
  contents: write
  # packages: write
  # issues: write


jobs:
  goreleaser-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GGOOS: linux

      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux
          path: dist

  goreleaser-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GGOOS: darwin

      - uses: actions/upload-artifact@v7
        with:
          name: dist-darwin
          path: dist

  goreleaser-merge:
    runs-on: ubuntu-latest
    needs:
      - goreleaser-linux
      - goreleaser-darwin
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v8
        with:
          path: dist-parts

      - name: Merge dist artifacts
        run: |
          rm -rf dist
          mkdir -p dist
          for part in dist-linux dist-darwin; do
            if [ -d "dist-parts/${part}/dist" ]; then
              cp -a "dist-parts/${part}/dist/." dist/
            else
              cp -a "dist-parts/${part}/." dist/
            fi
          done

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GO_GO_GOLEMS_SIGN_KEY }}
          passphrase: ${{ secrets.GO_GO_GOLEMS_SIGN_PASSPHRASE }}
          fingerprint: "6EBE1DF0BDF48A1BBA381B5B79983EF218C6ED7E"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          COSIGN_PWD: ${{ secrets.COSIGN_PWD }}
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}

  publish-docs:
    name: Publish docs
    permissions:
      contents: read
      id-token: write
    needs:
      - goreleaser-merge
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    uses: go-go-golems/infra-tooling/.github/workflows/publish-docsctl.yml@main
    with:
      package_name: pinocchio
      package_version: ${{ github.ref_name }}
      export_command: GOWORK=off go run ./cmd/pinocchio help export --format sqlite --output-path .docsctl/help.sqlite
      sqlite_path: .docsctl/help.sqlite
      docsctl_install_command: go install github.com/go-go-golems/glazed/cmd/docsctl@latest
      vault_role: docsctl-pinocchio-publisher
      vault_token_role: docsctl-pinocchio-publisher
      registry_url: https://docs-registry.yolo.scapegoat.dev
      verify_packages_url: https://docs.yolo.scapegoat.dev/api/packages
      verify_publish: true
